name: Deploy static preview to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate backend contracts
        run: npm run check:backend-contracts

      - name: Validate story service boundary
        run: npm run check:story-service

      - name: Validate Story AI safety contract
        run: npm run check:story-ai

      - name: Typecheck Story AI Edge Function
        run: npm run typecheck:story-ai

      - name: Validate story copy
        run: npm run check:story-copy

      - name: Validate translations
        run: npm run check:i18n

      - name: Typecheck app
        run: npm run typecheck

      - name: Validate remote story configuration
        env:
          QISSA_SUPABASE_ANON_KEY: ${{ secrets.QISSA_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$QISSA_SUPABASE_ANON_KEY" ]; then
            echo "QISSA_SUPABASE_ANON_KEY is missing. Refusing to deploy a silent local fallback."
            exit 1
          fi

          case "$QISSA_SUPABASE_ANON_KEY" in
            eyJ*.*.*|sb_publishable_*)
              echo "Remote story key is configured."
              ;;
            *)
              echo "QISSA_SUPABASE_ANON_KEY has an unexpected format."
              exit 1
              ;;
          esac

      - name: Build
        env:
          VITE_QISSA_STORY_PROVIDER: remote
          VITE_QISSA_STORY_ENDPOINT: https://phwakdpxxyncyslvnqht.supabase.co/functions/v1/story-generate
          VITE_QISSA_STATE_ENDPOINT: https://phwakdpxxyncyslvnqht.supabase.co/functions/v1/story-state
          VITE_QISSA_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.QISSA_SUPABASE_ANON_KEY }}
          VITE_QISSA_STORY_TIMEOUT_MS: 45000
          VITE_QISSA_STORY_FALLBACK_TO_LOCAL: false
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
