version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Tashkent
    open-pull-requests-limit: 5
    groups:
      development-tooling:
        dependency-type: development
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - security
