name: QISSA CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Validate backend contracts
        run: npm run check:backend-contracts

      - name: Validate story service boundary
        run: npm run check:story-service

      - name: Validate Story Core choice continuity
        run: npm run check:story-core

      - name: Validate localized fallback copy
        run: npm run check:localized-fallback

      - name: Validate space story copy
        run: npm run check:space-copy

      - name: Validate privacy consent and deletion
        run: npm run check:privacy

      - name: Validate listening playback
        run: npm run check:listening

      - name: Validate cache-first Audio Agent
        run: npm run check:audio-agent

      - name: Typecheck Audio Agent Edge Functions
        run: npm run typecheck:audio-agent

      - name: Validate Story AI safety contract
        run: npm run check:story-ai

      - name: Typecheck Story AI Edge Function
        run: npm run typecheck:story-ai

      - name: Validate story copy
        run: npm run check:story-copy

      - name: Validate translations
        run: npm run check:i18n

      - name: Typecheck app
        run: npm run typecheck

      - name: Build app
        run: npm run build
