name: Story Core Proof

on:
  pull_request:
    branches:
      - main
    paths:
      - supabase/functions/story-generate/**
      - scripts/check-story-core-proof.mjs
      - .github/workflows/story-core-proof.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies quietly
        run: npm ci --silent

      - name: Prove literary continuity across all worlds
        run: |
          set -o pipefail
          npm run check:story-core 2>&1 | tee story-core-proof.log

      - name: Upload focused proof log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: story-core-proof-log
          path: story-core-proof.log
          if-no-files-found: error
