name: Apply story opening quality patch

on:
  push:
    branches:
      - story-quality
    paths:
      - scripts/patch-story-quality-opening.mjs
      - .github/workflows/apply-story-quality-opening.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: story-quality

      - name: Apply guarded patch
        run: node scripts/patch-story-quality-opening.mjs

      - name: Commit patched fallback
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/functions/story-generate/fallback.ts
          git commit -m "Apply literary opening closings"
          git push origin HEAD:story-quality
